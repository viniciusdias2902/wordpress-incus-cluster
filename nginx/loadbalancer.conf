# Load balancer do stack.
#
# Em vez de declarar um 'upstream' estático, usamos o DNS interno do Docker
# (127.0.0.11) com proxy_pass por variável. Assim, cada nova réplica criada
# por `--scale wordpress=N` entra automaticamente no rodízio (round-robin),
# sem precisar editar este arquivo.

server {
    listen 80;
    server_name _;

    # Resolver do Docker Compose; revalida os IPs das réplicas a cada 10s.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Tamanho de upload (WordPress media).
    client_max_body_size 64m;

    location / {
        # A variável força o nginx a resolver "wordpress" em runtime,
        # distribuindo entre todas as réplicas ativas.
        set $backend http://wordpress;
        proxy_pass $backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # Endpoint leve para checar se o LB está de pé sem bater no WordPress.
    location = /lb-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
