# Trecho para COLAR dentro do server block HTTPS existente em
# /etc/nginx/sites-available/portfolio (o que tem `listen 443 ssl`).
#
# Não substitui nada — apenas ADICIONA o WordPress sob /loja/, ao lado do
# seu portfolio (location /), /slides/ e /tally/.
#
# Pré-requisito: o stack (compose) roda dentro do container Incus e está
# acessível em 127.0.0.1:8080 no host via um proxy device do Incus:
#   incus config device add web proxy8080 proxy \
#       listen=tcp:127.0.0.1:8080 connect=tcp:127.0.0.1:8080

    # redireciona /loja -> /loja/ (igual você já faz com /slides)
    location = /loja {
        return 301 /loja/;
    }

    # WordPress do cluster (subpath). A barra final no proxy_pass remove o
    # prefixo /loja antes de repassar ao container; o WP_SITEURL=/loja faz o
    # WordPress gerar os links de volta com o prefixo correto.
    location /loja/ {
        proxy_pass         http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /loja;

        client_max_body_size 64m;
        proxy_read_timeout   60s;
    }
